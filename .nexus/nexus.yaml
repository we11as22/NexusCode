model:
  provider: openai-compatible
  id: qwen/qwen3-coder-next
  apiKey: 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
  baseUrl: https://openrouter.ai/api/v1
  temperature: 0
modes:
  agent:
    autoApprove:
      - read
  plan:
    autoApprove:
      - read
  ask:
    autoApprove:
      - read
  debug:
    autoApprove:
      - read
indexing:
  enabled: true
  excludePatterns:
    - node_modules/**
    - .git/**
    - dist/**
    - build/**
    - '*.lock'
    - .next/**
    - coverage/**
  symbolExtract: true
  vector: false
  batchSize: 50
  embeddingBatchSize: 60
  embeddingConcurrency: 2
  debounceMs: 1500
permissions:
  autoApproveRead: true
  autoApproveWrite: false
  autoApproveCommand: false
  autoApproveReadPatterns: []
  allowedCommands: []
  allowCommandPatterns: []
  denyCommandPatterns: []
  askCommandPatterns: []
  denyPatterns:
    - '**/.env'
    - '**/secrets/**'
    - '**/*.key'
    - '**/*.pem'
  rules: []
retry:
  enabled: true
  maxAttempts: 3
  initialDelayMs: 1000
  maxDelayMs: 30000
  retryOnStatus:
    - 429
    - 500
    - 502
    - 503
    - 504
checkpoint:
  enabled: true
  timeoutMs: 15000
  createOnWrite: true
  doubleCheckCompletion: false
mcp:
  servers:
    - name: context-mode
      bundle: context-mode
skills: []
tools:
  custom: []
  classifyThreshold: 15
  parallelReads: true
  maxParallelReads: 5
skillClassifyThreshold: 8
structuredOutput: auto
summarization:
  auto: true
  threshold: 0.8
  keepRecentMessages: 8
  model: ''
parallelAgents:
  maxParallel: 4
agentLoop: {}
rules:
  files:
    - CLAUDE.md
    - AGENTS.md
    - .nexus/rules/**
profiles:
  fast:
    provider: openai
    id: gpt-4o-mini
  local:
    provider: ollama
    id: qwen2.5-coder:32b
    baseUrl: http://localhost:11434/v1
skillsConfig: []
